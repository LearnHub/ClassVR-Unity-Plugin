
apply plugin: 'com.android.library'

android {

    namespace 'com.example.openxrhook'

    compileSdkVersion 33

    defaultConfig {
        minSdkVersion 24
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                cppFlags ""
            }
        }

        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

android.libraryVariants.all { variant ->
    if (variant.name == "debug") {
        variant.outputs.all { output ->
            // Rename the .aar output file name here:
            output.outputFileName = "custom_openxr_loader.aar"
        }
    }
}



